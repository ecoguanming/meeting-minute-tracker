<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Minute Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Meeting Minute Tracker</h1>
      <p class="subtitle">Keep track of your meetings and their minutes in one place.</p>
    </header>

    <section class="new-meeting">
      <h2>New Meeting</h2>
      <form id="meeting-form">
        <input type="text" id="title" placeholder="Meeting title" required>
        <input type="date" id="date" required>
        <input type="text" id="attendees" placeholder="Attendees (comma separated)">
        <textarea id="notes" placeholder="Minutes / notes..." rows="4"></textarea>
        <button type="submit">Save Meeting</button>
      </form>
    </section>

    <section class="meeting-list">
      <h2>Meetings</h2>
      <div id="meetings"></div>
      <p id="empty-state" class="empty-state">No meetings yet. Add your first one above.</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
